<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FishLark — SoCal Fishing Intelligence Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

  #header {
    background: #1a1f2e; border-bottom: 1px solid #2d3748; padding: 10px 16px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap; z-index: 1000;
  }
  #header h1 { font-size: 16px; font-weight: 700; color: #f59e0b; white-space: nowrap; }
  #header .subtitle { font-size: 12px; color: #94a3b8; }

  .ctrl-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ctrl-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }

  select, input[type=range] {
    background: #2d3748; border: 1px solid #4a5568; color: #e2e8f0;
    border-radius: 4px; padding: 4px 8px; font-size: 12px;
  }
  select:focus { outline: none; border-color: #f59e0b; }

  .layer-btn {
    background: #2d3748; border: 1px solid #4a5568; color: #94a3b8;
    border-radius: 4px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    transition: all 0.15s;
  }
  .layer-btn.active { background: #f59e0b22; border-color: #f59e0b; color: #f59e0b; }
  .layer-btn:hover { border-color: #f59e0b; color: #f59e0b; }

  #map { flex: 1; }

  #panel {
    position: absolute; top: 70px; right: 12px; width: 280px;
    background: #1a1f2edd; border: 1px solid #2d3748; border-radius: 8px;
    padding: 12px; z-index: 800; max-height: calc(100vh - 90px); overflow-y: auto;
    backdrop-filter: blur(8px);
  }
  #panel h3 { font-size: 13px; color: #f59e0b; margin-bottom: 10px; }

  .species-list { display: flex; flex-direction: column; gap: 4px; }
  .sp-row {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 4px 6px; border-radius: 4px; transition: background 0.1s;
  }
  .sp-row:hover { background: #2d374844; }
  .sp-row.active { background: #2d3748; }
  .sp-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .sp-name { font-size: 12px; color: #cbd5e1; flex: 1; }
  .sp-count { font-size: 11px; color: #64748b; }

  #info-box {
    position: absolute; bottom: 20px; left: 12px;
    background: #1a1f2edd; border: 1px solid #2d3748; border-radius: 8px;
    padding: 12px; z-index: 800; max-width: 320px;
    backdrop-filter: blur(8px); display: none;
  }
  #info-box h4 { font-size: 13px; color: #f59e0b; margin-bottom: 6px; }
  #info-box .info-row { font-size: 12px; color: #94a3b8; margin: 3px 0; }
  #info-box .info-row span { color: #e2e8f0; }

  .legend {
    position: absolute; bottom: 20px; right: 12px; z-index: 800;
    background: #1a1f2edd; border: 1px solid #2d3748; border-radius: 8px;
    padding: 10px; backdrop-filter: blur(8px);
  }
  .legend-title { font-size: 11px; color: #64748b; margin-bottom: 6px; text-transform: uppercase; }
  .legend-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 11px; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 2px; }

  .quality-bar {
    display: flex; gap: 2px; margin-top: 4px;
  }
  .q-swatch { flex: 1; height: 8px; border-radius: 2px; }

  /* Cluster overrides */
  .marker-cluster-small div,
  .marker-cluster-medium div,
  .marker-cluster-large div {
    background-color: rgba(245,158,11,0.85) !important;
    color: #1a1f2e !important;
    font-weight: 700;
    font-size: 12px;
  }
  .marker-cluster-small,
  .marker-cluster-medium,
  .marker-cluster-large {
    background-color: rgba(245,158,11,0.3) !important;
  }

  /* Loading overlay */
  #loading {
    position: absolute; inset: 0; background: #0f1117ee; z-index: 2000;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  }
  #loading-text { font-size: 14px; color: #94a3b8; }
  .spinner { width: 32px; height: 32px; border: 3px solid #2d3748;
             border-top-color: #f59e0b; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>🎣 FishLark</h1>
    <div class="subtitle">SoCal & Baja Fishing Intelligence</div>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Layer</span>
    <button class="layer-btn active" id="btn-hotspots" onclick="toggleLayer('hotspots')">Hotspots</button>
    <button class="layer-btn active" id="btn-tracks" onclick="toggleLayer('tracks')">Migration Tracks</button>
    <button class="layer-btn" id="btn-waypoints" onclick="toggleLayer('waypoints')">GPS Waypoints</button>
    <button class="layer-btn" id="btn-observations" onclick="toggleLayer('observations')">Raw Observations</button>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Basemap</span>
    <select id="basemap-sel" onchange="switchBasemap(this.value)">
      <option value="ocean">ESRI Ocean</option>
      <option value="osm">OpenStreetMap</option>
      <option value="satellite">ESRI Satellite</option>
      <option value="dark">CartoDB Dark</option>
    </select>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Month</span>
    <select id="month-sel" onchange="filterMonth(this.value)">
      <option value="all">All Year</option>
      <option value="1">January</option><option value="2">February</option>
      <option value="3">March</option><option value="4">April</option>
      <option value="5">May</option><option value="6">June</option>
      <option value="7">July</option><option value="8">August</option>
      <option value="9">September</option><option value="10">October</option>
      <option value="11">November</option><option value="12">December</option>
    </select>
  </div>
</div>

<div id="map"></div>

<!-- Species panel -->
<div id="panel">
  <h3>Species</h3>
  <div class="species-list" id="species-list"></div>
</div>

<!-- Info box -->
<div id="info-box">
  <h4 id="info-title">—</h4>
  <div id="info-content"></div>
</div>

<!-- Quality legend -->
<div class="legend">
  <div class="legend-title">Catch Quality</div>
  <div class="quality-bar">
    <div class="q-swatch" style="background:#374151" title="0 – None"></div>
    <div class="q-swatch" style="background:#6b7280" title="1 – Poor"></div>
    <div class="q-swatch" style="background:#f59e0b" title="2 – Fair"></div>
    <div class="q-swatch" style="background:#f97316" title="3 – Good"></div>
    <div class="q-swatch" style="background:#ef4444" title="4 – Very Good"></div>
    <div class="q-swatch" style="background:#dc2626" title="5 – Excellent"></div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:10px;color:#64748b;margin-top:2px">
    <span>None</span><span>Excellent</span>
  </div>
  <div style="margin-top:8px">
    <div class="legend-row"><div class="legend-swatch" style="background:#3b82f6;border-radius:50%"></div><span>Hotspot (size = days)</span></div>
    <div class="legend-row"><div style="width:14px;height:3px;background:#f59e0b"></div><span>Migration track</span></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#10b98188;border-radius:50%"></div><span>GPS waypoint</span></div>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">Loading FishLark data…</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ---------------------------------------------------------------------------
// Basemap tiles
// ---------------------------------------------------------------------------
const TILES = {
  ocean:     ['https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}',
              '© ESRI, GEBCO, NOAA'],
  osm:       ['https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', '© OpenStreetMap'],
  satellite: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
              '© ESRI'],
  dark:      ['https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', '© CartoDB'],
};

const map = L.map('map', { zoomControl: true }).setView([32.7, -117.8], 8);
let currentTile = L.tileLayer(TILES.ocean[0], { attribution: TILES.ocean[1], maxZoom: 19 }).addTo(map);

function switchBasemap(key) {
  map.removeLayer(currentTile);
  currentTile = L.tileLayer(TILES[key][0], { attribution: TILES[key][1], maxZoom: 19 }).addTo(map);
  currentTile.bringToBack();
}

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const SPECIES_COLORS = {
  yellowtail: '#f59e0b', bluefin_tuna: '#3b82f6', yellowfin_tuna: '#f97316',
  dorado: '#10b981', white_seabass: '#8b5cf6', halibut: '#64748b',
  barracuda: '#ef4444', bonito: '#06b6d4', calico_bass: '#84cc16',
  sand_bass: '#a3e635', rockfish: '#dc2626', sculpin: '#b45309',
  whitefish: '#e2e8f0', lingcod: '#475569', sheephead: '#ec4899',
  squid: '#a78bfa',
};

const QUALITY_COLORS = ['#374151','#6b7280','#f59e0b','#f97316','#ef4444','#dc2626'];

let layers = { hotspots: null, tracks: null, waypoints: null, observations: null };
let layerVisible = { hotspots: true, tracks: true, waypoints: false, observations: false };
let activeSpecies = new Set(Object.keys(SPECIES_COLORS));
let currentMonth = 'all';
let geoData = {};

// ---------------------------------------------------------------------------
// Load GeoJSON files
// ---------------------------------------------------------------------------
async function loadJSON(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`Failed to load ${path}: ${r.status}`);
  return r.json();
}

async function init() {
  try {
    document.getElementById('loading-text').textContent = 'Loading hotspots…';
    geoData.hotspots = await loadJSON('species_hotspots.geojson');

    document.getElementById('loading-text').textContent = 'Loading migration tracks…';
    geoData.tracks = await loadJSON('migration_tracks.geojson');

    document.getElementById('loading-text').textContent = 'Loading GPS waypoints…';
    geoData.waypoints = await loadJSON('gps_waypoints.geojson');

    document.getElementById('loading-text').textContent = 'Loading observations…';
    try {
      geoData.observations = await loadJSON('daily_observations.geojson');
    } catch (e) {
      geoData.observations = { type: 'FeatureCollection', features: [] };
    }

    buildSpeciesPanel();
    renderAll();
    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    document.getElementById('loading-text').textContent = 'Error: ' + e.message +
      ' — Make sure you ran: python export_geo.py';
    console.error(e);
  }
}

// ---------------------------------------------------------------------------
// Species panel
// ---------------------------------------------------------------------------
function buildSpeciesPanel() {
  // Count hotspots per species
  const counts = {};
  for (const f of geoData.hotspots.features) {
    const sp = f.properties.species;
    counts[sp] = (counts[sp] || 0) + 1;
  }

  const el = document.getElementById('species-list');
  el.innerHTML = '';

  // All / None toggles
  const allRow = document.createElement('div');
  allRow.style.cssText = 'display:flex;gap:8px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #2d3748';
  allRow.innerHTML = `
    <button class="layer-btn active" onclick="selectAllSpecies(true)" style="font-size:10px;padding:2px 8px">All</button>
    <button class="layer-btn" onclick="selectAllSpecies(false)" style="font-size:10px;padding:2px 8px">None</button>
  `;
  el.appendChild(allRow);

  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  for (const [sp, count] of sorted) {
    const color = SPECIES_COLORS[sp] || '#6b7280';
    const row = document.createElement('div');
    row.className = 'sp-row active';
    row.id = `sp-row-${sp}`;
    row.onclick = () => toggleSpecies(sp);
    row.innerHTML = `
      <div class="sp-dot" style="background:${color}"></div>
      <div class="sp-name">${sp.replace(/_/g, ' ')}</div>
      <div class="sp-count">${count}</div>
    `;
    el.appendChild(row);
  }
}

function toggleSpecies(sp) {
  if (activeSpecies.has(sp)) {
    activeSpecies.delete(sp);
    document.getElementById(`sp-row-${sp}`)?.classList.remove('active');
  } else {
    activeSpecies.add(sp);
    document.getElementById(`sp-row-${sp}`)?.classList.add('active');
  }
  renderAll();
}

function selectAllSpecies(all) {
  activeSpecies = all ? new Set(Object.keys(SPECIES_COLORS)) : new Set();
  document.querySelectorAll('.sp-row').forEach(r => {
    if (all) r.classList.add('active'); else r.classList.remove('active');
  });
  renderAll();
}

// ---------------------------------------------------------------------------
// Layer toggle
// ---------------------------------------------------------------------------
function toggleLayer(name) {
  layerVisible[name] = !layerVisible[name];
  document.getElementById(`btn-${name}`).classList.toggle('active', layerVisible[name]);
  renderAll();
}

// ---------------------------------------------------------------------------
// Month filter
// ---------------------------------------------------------------------------
function filterMonth(val) {
  currentMonth = val;
  renderAll();
}

function matchesMonth(dateStr) {
  if (currentMonth === 'all') return true;
  if (!dateStr) return false;
  const m = parseInt(dateStr.substring(5, 7));
  return m === parseInt(currentMonth);
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
function renderAll() {
  renderHotspots();
  renderTracks();
  renderWaypoints();
  renderObservations();
}

function clearLayer(name) {
  if (layers[name]) { map.removeLayer(layers[name]); layers[name] = null; }
}

function renderHotspots() {
  clearLayer('hotspots');
  if (!layerVisible.hotspots || !geoData.hotspots) return;

  const group = L.layerGroup();
  for (const f of geoData.hotspots.features) {
    const p = f.properties;
    if (!activeSpecies.has(p.species)) continue;
    if (currentMonth !== 'all') {
      const inMonth = matchesMonth(p.first_seen) || matchesMonth(p.last_seen);
      if (!inMonth) continue;
    }
    const [lon, lat] = f.geometry.coordinates;
    const radius = Math.max(5000, Math.min(40000, p.total_days * 500));
    const color = p.color || SPECIES_COLORS[p.species] || '#6b7280';
    const qColor = QUALITY_COLORS[Math.round(p.avg_quality)] || '#6b7280';

    const circle = L.circle([lat, lon], {
      radius,
      color: color,
      fillColor: qColor,
      fillOpacity: 0.35,
      weight: 2,
      opacity: 0.8,
    });
    circle.bindPopup(buildHotspotPopup(p));
    circle.on('click', () => showInfo(p.species_display + ' Hotspot', buildInfoRows(p)));
    group.addLayer(circle);
  }
  layers.hotspots = group.addTo(map);
}

function renderTracks() {
  clearLayer('tracks');
  if (!layerVisible.tracks || !geoData.tracks) return;

  const group = L.layerGroup();
  for (const f of geoData.tracks.features) {
    const p = f.properties;
    if (!activeSpecies.has(p.species)) continue;
    const color = p.color || SPECIES_COLORS[p.species] || '#6b7280';

    if (f.geometry.type === 'LineString') {
      const latlngs = f.geometry.coordinates.map(c => [c[1], c[0]]);
      const isAnnual = p.type === 'annual_migration';
      const line = L.polyline(latlngs, {
        color,
        weight: isAnnual ? 3 : 1.5,
        opacity: isAnnual ? 0.85 : 0.4,
        dashArray: isAnnual ? null : '4 4',
      });
      if (isAnnual) {
        line.bindPopup(`<b>${p.species_display}</b><br>Annual migration track`);
      } else {
        line.bindPopup(`<b>${p.species_display}</b><br>${p.date || ''}<br>${p.distance_miles || 0} mi — Moon: ${p.moon_phase || '?'}`);
      }
      group.addLayer(line);
    } else if (f.geometry.type === 'Point' && p.type === 'monthly_centroid') {
      if (currentMonth !== 'all' && p.month) {
        const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const mIdx = monthNames.indexOf(p.month);
        if (mIdx + 1 !== parseInt(currentMonth)) continue;
      }
      const [lon, lat] = f.geometry.coordinates;
      const qColor = QUALITY_COLORS[Math.round(p.avg_quality)] || '#6b7280';
      const marker = L.circleMarker([lat, lon], {
        radius: 8,
        color,
        fillColor: qColor,
        fillOpacity: 0.9,
        weight: 2,
      });
      marker.bindPopup(`<b>${p.species_display}</b><br>${p.month}<br>Quality: ${p.avg_quality}<br>Days: ${p.n_report_days}<br>Zones: ${p.zones}`);
      marker.on('click', () => showInfo(p.species_display + ' — ' + p.month,
        `<div class="info-row">Avg Quality: <span>${p.avg_quality}</span></div>
         <div class="info-row">Report Days: <span>${p.n_report_days}</span></div>
         <div class="info-row">Zones: <span>${p.zones}</span></div>`));
      group.addLayer(marker);
    }
  }
  layers.tracks = group.addTo(map);
}

function renderWaypoints() {
  clearLayer('waypoints');
  if (!layerVisible.waypoints || !geoData.waypoints) return;

  const group = L.layerGroup();
  for (const f of geoData.waypoints.features) {
    const p = f.properties;
    if (!p.name) continue;
    const [lon, lat] = f.geometry.coordinates;
    const marker = L.circleMarker([lat, lon], {
      radius: 3, color: '#10b981', fillColor: '#10b981', fillOpacity: 0.6, weight: 1,
    });
    marker.bindPopup(`<b>${p.name}</b><br>Zone: ${p.zone}<br>Date: ${p.report_date}`);
    group.addLayer(marker);
  }
  layers.waypoints = group.addTo(map);
}

function renderObservations() {
  clearLayer('observations');
  if (!layerVisible.observations || !geoData.observations) return;

  // Per-species cluster groups so dominant species sets cluster color
  const spGroups = {};

  for (const f of geoData.observations.features) {
    const p = f.properties;
    if (!activeSpecies.has(p.species)) continue;
    if (!matchesMonth(p.date)) continue;

    const [lon, lat] = f.geometry.coordinates;
    const color = SPECIES_COLORS[p.species] || '#6b7280';
    const qColor = p.quality_color || '#6b7280';

    if (!spGroups[p.species]) {
      const hexToRgba = (h, a) => {
        const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
        return `rgba(${r},${g},${b},${a})`;
      };
      spGroups[p.species] = L.markerClusterGroup({
        maxClusterRadius: 40,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        zoomToBoundsOnClick: true,
        iconCreateFunction(cluster) {
          const count = cluster.getChildCount();
          const size = count < 20 ? 28 : count < 100 ? 34 : 40;
          return L.divIcon({
            html: `<div style="
              background:${hexToRgba(color, 0.25)};
              border:2px solid ${color};
              border-radius:50%;
              width:${size}px;height:${size}px;
              display:flex;align-items:center;justify-content:center;
              font-size:11px;font-weight:700;color:${color};">${count}</div>`,
            className: '',
            iconSize: [size, size],
            iconAnchor: [size/2, size/2],
          });
        },
      });
    }

    const marker = L.circleMarker([lat, lon], {
      radius: 5, color, fillColor: qColor, fillOpacity: 0.85, weight: 1.5,
    });
    marker.bindPopup(
      `<b>${p.species_display}</b><br>
       ${p.date}${p.coord_name ? ' — ' + p.coord_name : ''}<br>
       Quality: ${p.quality}/5<br>
       Moon: ${p.moon_phase || '?'}<br>
       Tide: ${p.tide_dir || '?'}<br>
       Seas: ${p.seas_ft != null ? p.seas_ft + ' ft' : '?'}<br>
       Wind: ${p.wind_dir || '?'}<br>
       Water temp: ${p.water_temp != null ? p.water_temp + '°F' : '?'}`
    );
    spGroups[p.species].addLayer(marker);
  }

  const combined = L.layerGroup(Object.values(spGroups));
  layers.observations = combined.addTo(map);
}

// ---------------------------------------------------------------------------
// Popups and info panel
// ---------------------------------------------------------------------------
function buildHotspotPopup(p) {
  return `<b>${p.species_display}</b><br>
    Days on spot: ${p.total_days}<br>
    GPS reports: ${p.total_points}<br>
    Avg quality: ${p.avg_quality}/5<br>
    Active: ${p.first_seen} → ${p.last_seen}<br>
    Zones: ${p.zones}`;
}

function buildInfoRows(p) {
  return `
    <div class="info-row">Species: <span>${p.species_display}</span></div>
    <div class="info-row">Days on spot: <span>${p.total_days}</span></div>
    <div class="info-row">GPS reports: <span>${p.total_points}</span></div>
    <div class="info-row">Avg quality: <span>${p.avg_quality} / 5</span></div>
    <div class="info-row">Active: <span>${p.first_seen} → ${p.last_seen}</span></div>
    <div class="info-row">Zones: <span>${p.zones}</span></div>
  `;
}

function showInfo(title, content) {
  document.getElementById('info-title').textContent = title;
  document.getElementById('info-content').innerHTML = content;
  document.getElementById('info-box').style.display = 'block';
}

// Close info box on map click
map.on('click', () => { document.getElementById('info-box').style.display = 'none'; });

// ---------------------------------------------------------------------------
// Start
// ---------------------------------------------------------------------------
init();
</script>
</body>
</html>
